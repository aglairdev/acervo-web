<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acervo</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Acervo" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css">
  <script defer src="assets/js/main.js"></script>
</head>
<body>
  <header>
    <svg class="logo-sprite anim-slide-down" width="64" height="48" viewBox="0 0 16 12"
      xmlns="http://www.w3.org/2000/svg">
      <rect width="16" height="12" fill="none" />
      <rect x="1" y="3" width="14" height="6" rx="2" fill="#3a3a5c" />
      <rect x="2" y="4" width="12" height="4" rx="1" fill="#1a1a2e" />
      <rect x="3" y="5" width="1" height="2" fill="#92cc41" />
      <rect x="2" y="6" width="3" height="1" fill="#92cc41" />
      <rect x="11" y="5" width="1" height="1" fill="#e76e55" />
      <rect x="12" y="6" width="1" height="1" fill="#209cee" />
      <rect x="6" y="6" width="1" height="1" fill="#7070a0" />
      <rect x="8" y="6" width="1" height="1" fill="#7070a0" />
    </svg>
    <h1 class="anim-slide-down delay-1">ACERVO<span class="cursor">_</span></h1>
    <p class="anim-slide-down delay-2">PRESERVAÇÃO DIGITAL · BUSCA RÁPIDA · DOWNLOAD DIRETO</p>
  </header>
  <main>
    <div class="search-wrap anim-slide-up delay-2">
      <div class="nes-container with-title" style="padding: 1.2rem; border-color: var(--border);">
        <p class="title">BUSCAR</p>
        <div class="search-box">
          <input id="search-input" type="text" class="nes-input" placeholder="Digite o nome ..."
            autocomplete="off" spellcheck="false" />
          <button id="search-btn" class="nes-btn is-success btn-download">BUSCAR</button>
        </div>
        <div class="stats-bar">
          <div>TOTAL: <span id="stat-total">—</span> INDEXADAS</div>
          <div id="stat-consoles">CARREGANDO...</div>
        </div>
      </div>
    </div>
    <div class="results-wrap anim-fade delay-3" id="results-wrap">
      <div class="state-msg" id="state-msg" style="display:none"></div>
    </div>
  </main>
<footer>
  <div class="footer-statusbar">
    <div class="footer-status-item">
      ROMS: <span class="footer-val" id="footer-stat-roms">—</span>
    </div>
    <div class="footer-status-item">
      STATUS: <span class="footer-val">ONLINE</span>
    </div>
    <div class="footer-status-item">
      DESKTOP: <a class="footer-val footer-link" href="https://gamefetch.netlify.app/" target="_blank" rel="noopener">GAMEFETCH <span class="arrow">↗</span></a>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="footer-policy">
      SEM COOKIES<span class="sep"> · </span>SEM ADS<span class="sep"> · </span>SEM TRACKING
    </div>
    <div class="footer-brand"><span class="brand-symbol">ꕤ</span></div>
  </div>
</footer>
</body>
</html>
